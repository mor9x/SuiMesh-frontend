<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuiMesh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020202;
      --panel: rgba(255, 255, 255, 0.04);
      --line: rgba(147, 202, 255, 0.34);
      --line-soft: rgba(147, 202, 255, 0.14);
      --text: #f3f8ff;
      --muted: rgba(237, 244, 255, 0.84);
      --blue: #56b7ff;
      --blue-strong: #2e7cff;
      --blue-soft: rgba(86, 183, 255, 0.18);
      --hero-copy-width: 620px;
    }

    html, body {
      min-height: 100%;
      background: #000;
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    body {
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 73% 41%, rgba(49, 114, 255, 0.18), transparent 18%),
        radial-gradient(circle at 77% 55%, rgba(48, 104, 255, 0.14), transparent 25%),
        radial-gradient(circle at 84% 45%, rgba(15, 45, 112, 0.18), transparent 30%),
        #010101;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0) 20%),
        radial-gradient(circle at 22% 36%, rgba(255, 255, 255, 0.03), transparent 24%),
        radial-gradient(circle at 78% 48%, rgba(73, 142, 255, 0.09), transparent 28%);
      opacity: 0.9;
    }

    .page {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      padding: 24px 28px 36px;
    }

    .header {
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      align-items: center;
      gap: 24px;
      position: relative;
      z-index: 3;
    }

    .brand {
      width: 186px;
      height: 66px;
      border: 1px solid rgba(255, 255, 255, 0.025);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 0 22px;
      text-decoration: none;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.01);
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      position: relative;
      transform: rotate(45deg);
    }

    .brand-mark span {
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 999px 999px 0 999px;
      background: #fff;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.18);
    }

    .brand-mark span:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateX(8px); }
    .brand-mark span:nth-child(2) { transform: translate(-50%, -50%) rotate(72deg) translateX(8px); }
    .brand-mark span:nth-child(3) { transform: translate(-50%, -50%) rotate(144deg) translateX(8px); }
    .brand-mark span:nth-child(4) { transform: translate(-50%, -50%) rotate(216deg) translateX(8px); }
    .brand-mark span:nth-child(5) { transform: translate(-50%, -50%) rotate(288deg) translateX(8px); }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 46px;
    }

    .nav a {
      position: relative;
      color: rgba(255, 255, 255, 0.86);
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .nav a.active {
      font-weight: 700;
      color: #fff;
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -14px;
      width: 5px;
      height: 5px;
      margin-left: -2.5px;
      border-radius: 50%;
      background: #35a8ff;
      box-shadow: 0 0 12px rgba(53, 168, 255, 0.95);
    }

    .header-cta {
      display: flex;
      justify-content: flex-end;
    }

    .outline-button,
    .primary-button {
      border-radius: 999px;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      will-change: transform;
    }

    .outline-button:hover,
    .primary-button:hover {
      transform: translateY(-1px);
    }

    .outline-button {
      min-width: 168px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #7fd5ff;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(10, 17, 31, 0.72), rgba(5, 10, 20, 0.44));
      box-shadow:
        inset 0 0 18px rgba(69, 154, 255, 0.08),
        0 0 18px rgba(57, 132, 255, 0.16);
      font-size: 16px;
      font-weight: 500;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(520px, 1.18fr);
      align-items: center;
      min-height: calc(100vh - 120px);
      margin-top: 8px;
      position: relative;
      z-index: 2;
    }

    .hero-copy {
      padding-left: 24px;
      max-width: var(--hero-copy-width);
      margin-top: -38px;
    }

    h1 {
      font-size: clamp(68px, 6.2vw, 96px);
      line-height: 0.98;
      font-weight: 300;
      letter-spacing: -0.06em;
      color: #eef5ff;
      text-wrap: balance;
    }

    h1 .accent {
      color: #a9d8ff;
    }

    .subtitle {
      margin-top: 34px;
      max-width: 560px;
      color: var(--muted);
      font-size: 22px;
      line-height: 1.58;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .actions {
      display: flex;
      gap: 20px;
      margin-top: 46px;
      flex-wrap: wrap;
    }

    .primary-button {
      min-width: 292px;
      height: 68px;
      padding: 0 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #fff;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: -0.02em;
      border: 1px solid rgba(152, 220, 255, 0.38);
      background:
        radial-gradient(circle at 18% 25%, rgba(255, 255, 255, 0.55), transparent 24%),
        radial-gradient(circle at 84% 50%, rgba(34, 109, 255, 0.78), rgba(12, 44, 131, 0.96) 48%, rgba(7, 18, 40, 0.98) 100%),
        linear-gradient(90deg, rgba(131, 204, 255, 0.95), rgba(37, 100, 250, 1));
      box-shadow:
        inset 0 0 24px rgba(255, 255, 255, 0.28),
        inset -18px 0 34px rgba(40, 129, 255, 0.36),
        0 0 26px rgba(54, 123, 255, 0.36);
    }

    .ghost-button {
      min-width: 184px;
      height: 68px;
      padding: 0 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.92);
      font-size: 19px;
      font-weight: 400;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.015);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .hero-art {
      position: relative;
      min-height: 760px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(54px);
    }

    .hero-art::before {
      content: "";
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(35, 90, 255, 0.17), transparent 58%);
      filter: blur(20px);
    }

    .flower {
      position: relative;
      width: min(54vw, 820px);
      aspect-ratio: 1 / 1;
      filter: drop-shadow(0 0 18px rgba(90, 159, 255, 0.55)) drop-shadow(0 0 48px rgba(25, 88, 255, 0.35));
    }

    .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 36%;
      height: 46%;
      transform-origin: 50% calc(100% + 30px);
      margin-left: -18%;
      margin-top: -44%;
      border-radius: 56% 56% 58% 58% / 74% 74% 32% 32%;
      background:
        radial-gradient(circle at 50% 19%, rgba(255, 255, 255, 0.95), rgba(178, 214, 255, 0.55) 12%, rgba(31, 88, 255, 0.22) 19%, rgba(1, 10, 34, 0.95) 43%, rgba(1, 4, 13, 1) 76%),
        radial-gradient(circle at 50% 58%, rgba(34, 110, 255, 0.18), transparent 62%);
      border: 3px solid rgba(123, 190, 255, 0.94);
      box-shadow:
        0 0 10px rgba(162, 221, 255, 0.96),
        0 0 24px rgba(80, 141, 255, 0.96),
        inset 0 0 20px rgba(187, 222, 255, 0.22),
        inset 0 -12px 26px rgba(18, 65, 194, 0.26);
    }

    .petal::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      border: 1px solid rgba(188, 232, 255, 0.32);
      opacity: 0.72;
      filter: blur(0.4px);
    }

    .petal::after {
      content: "";
      position: absolute;
      left: 16%;
      right: 16%;
      top: 7%;
      height: 22%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.06) 72%, transparent 74%);
      filter: blur(5px);
      opacity: 0.9;
    }

    .petal.p1 { transform: rotate(0deg) translateY(-30px); }
    .petal.p2 { transform: rotate(72deg) translateY(-30px); }
    .petal.p3 { transform: rotate(144deg) translateY(-30px); }
    .petal.p4 { transform: rotate(216deg) translateY(-30px); }
    .petal.p5 { transform: rotate(288deg) translateY(-30px); }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 11%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(153, 218, 255, 0.98), rgba(18, 63, 188, 0.58) 28%, rgba(0, 3, 12, 0.98) 70%);
      box-shadow:
        0 0 18px rgba(129, 205, 255, 0.92),
        0 0 42px rgba(35, 105, 255, 0.55);
    }

    .core::after {
      content: "";
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(57, 135, 255, 0.3), transparent 72%);
      filter: blur(8px);
    }

    .arrow {
      font-size: 1.05em;
      line-height: 1;
      transform: translateY(-1px);
    }

    @media (max-width: 1200px) {
      .header {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .header-cta {
        justify-content: center;
      }

      .hero {
        grid-template-columns: 1fr;
        padding-top: 40px;
      }

      .hero-copy {
        max-width: 760px;
        padding-left: 0;
        margin: 0 auto;
        text-align: center;
      }

      .subtitle {
        margin-left: auto;
        margin-right: auto;
      }

      .actions {
        justify-content: center;
      }

      .hero-art {
        min-height: 640px;
        transform: none;
      }

      .flower {
        width: min(72vw, 720px);
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 18px 16px 28px;
      }

      .brand {
        width: 100%;
        max-width: 220px;
        justify-content: center;
      }

      .nav {
        gap: 28px;
      }

      .nav a {
        font-size: 16px;
      }

      h1 {
        font-size: clamp(48px, 14vw, 74px);
      }

      .subtitle {
        font-size: 18px;
      }

      .primary-button,
      .ghost-button,
      .outline-button {
        width: 100%;
        min-width: 0;
      }

      .actions {
        gap: 14px;
      }

      .hero-art {
        min-height: 440px;
      }

      .flower {
        width: min(92vw, 520px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a class="brand" href="#" aria-label="SuiMesh home">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span class="brand-name">SuiMesh</span>
      </a>

      <nav class="nav" aria-label="Primary navigation">
        <a class="active" href="#">GitHub</a>
        <a href="#">Docs</a>
      </nav>

      <div class="header-cta">
        <a class="outline-button" href="#">
          <span>Get Started</span>
          <span class="arrow">↗</span>
        </a>
      </div>
    </header>

    <main class="hero">
      <section class="hero-copy">
        <h1>
          Own the Context<span class="accent">.</span><br>
          Verify the Action<span class="accent">.</span>
        </h1>

        <p class="subtitle">
          SuiMesh is the agent-to-agent communication protocol<br>
          for the Sui ecosystem.
        </p>

        <div class="actions">
          <a class="primary-button" href="#">
            <span>Explore Protocol</span>
            <span class="arrow">↗</span>
          </a>
          <a class="ghost-button" href="#">Read Docs</a>
        </div>
      </section>

      <section class="hero-art" aria-hidden="true">
        <div class="flower">
          <div class="petal p1"></div>
          <div class="petal p2"></div>
          <div class="petal p3"></div>
          <div class="petal p4"></div>
          <div class="petal p5"></div>
          <div class="core"></div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
